<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #111;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
      color: #111;
    }

    .subtitle {
      font-size: 11px;
      color: #6b7280;
      margin-top: 2px;
    }

    /* Toggle switch */
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { display: none; }
    .slider {
      position: absolute; inset: 0;
      background: #d1d5db;
      border-radius: 999px;
      cursor: pointer;
      transition: background .2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    input:checked + .slider { background: #6366f1; }
    input:checked + .slider::before { transform: translateX(20px); }

    .status {
      font-size: 11px;
      padding: 8px 18px;
      background: #f0fdf4;
      color: #166534;
      border-bottom: 1px solid #bbf7d0;
    }
    .status.off {
      background: #fef9c3;
      color: #854d0e;
      border-bottom-color: #fde047;
    }

    .logs-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px 6px;
    }
    .logs-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #6b7280;
    }
    .clear-btn {
      font-size: 11px;
      color: #6b7280;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    .clear-btn:hover { color: #ef4444; }

    .logs {
      max-height: 240px;
      overflow-y: auto;
      padding: 0 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .log-item {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 7px;
      padding: 8px 10px;
      font-size: 12px;
    }
    .log-msg { color: #111; word-break: break-all; }
    .log-time { font-size: 10px; color: #9ca3af; margin-top: 2px; }

    .empty {
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
      padding: 20px 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <div class="title">Auto Resume Downloads</div>
      <div class="subtitle">Resumes interrupted downloads automatically</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggle" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="status" id="status">Actively monitoring downloads</div>

  <div class="logs-header">
    <span class="logs-label">Activity Log</span>
    <button class="clear-btn" id="clearBtn">Clear</button>
  </div>

  <div class="logs" id="logs">
    <div class="empty">No activity yet</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
